name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v17

      - name: Run Unit Tests
        run: nix develop --command bash -c 'runghc test/UnitTest.hs'

      - name: Run Performance Tests
        run: nix develop --command bash -c 'runghc test/PerformanceTest.hs'
